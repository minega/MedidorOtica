name: iOS CI

on:
  pull_request:
    paths:
      - ".github/workflows/ios-ci.yml"
      - "MedidorOticaApp/**"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - ".github/workflows/ios-ci.yml"
      - "MedidorOticaApp/**"
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build e testes no simulador
    runs-on: macos-latest
    env:
      PROJECT_PATH: MedidorOticaApp/MedidorOticaApp.xcodeproj
      SCHEME: MedidorOticaApp
      DERIVED_DATA: ${{ github.workspace }}/.build/ios-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Selecionar Xcode estável
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Exibir versão do Xcode
        run: xcodebuild -version

      - name: Selecionar simulador disponível
        id: simulator
        shell: bash
        run: |
          SIMULATOR_ID=$(
            xcrun simctl list -j devices available | python3 -c '
import json
import sys

payload = json.load(sys.stdin)["devices"]

for runtime_name in sorted(payload.keys(), reverse=True):
    devices = payload[runtime_name]
    iphones = [device for device in devices if device.get("isAvailable") and device["name"].startswith("iPhone")]
    if iphones:
        print(iphones[0]["udid"])
        break
'
          )

          if [ -z "$SIMULATOR_ID" ]; then
            echo "::error::Nenhum simulador de iPhone disponível no runner."
            exit 1
          fi

          echo "id=$SIMULATOR_ID" >> "$GITHUB_OUTPUT"

      - name: Build e testes
        shell: bash
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "id=${{ steps.simulator.outputs.id }}" \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            clean test

